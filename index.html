<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Montserrat:wght@100;200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=23">
</head>
<body class="home">
  <main class="home-main">
    <h1 class="home-title"><span id="scramble-title"></span><span class="home-title-name">finn freund</span></h1>
    <nav class="home-nav">
      <a href="/about">about me</a>
      <a href="/contact">contact/socials</a>
    </nav>
  </main>

  <script>
    const target = 'portfolio';
    const el = document.getElementById('scramble-title');
    const letters = 'abcdefghijklmnopqrstuvwxyz';
    const cycles = 13;
    const stepDelay = 60;
    const letterStagger = 100;

    const spans = target.split('').map(char => {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.display = 'inline-block';
      span.style.textAlign = 'center';
      span.style.overflow = 'hidden';
      span.style.verticalAlign = 'top';
      el.appendChild(span);
      return span;
    });

    spans.forEach(span => {
      span.style.width = span.getBoundingClientRect().width + 'px';
    });

    function animateLetter(index) {
      const finalChar = target[index];
      const span = spans[index];
      let count = 0;

      const interval = setInterval(() => {
        span.textContent = finalChar === ' '
          ? ' '
          : letters[Math.floor(Math.random() * letters.length)];
        count++;

        if (count >= cycles) {
          clearInterval(interval);
          span.textContent = finalChar;
        }
      }, stepDelay);
    }

    spans.forEach((span, i) => {
      span.textContent = target[i] === ' ' ? ' ' : letters[0];
    });

    target.split('').forEach((_, i) => {
      setTimeout(() => animateLetter(i), i * letterStagger);
    });
  </script>
</body>
</html>
