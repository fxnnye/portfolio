<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Montserrat:wght@100;200&display=swap" rel="stylesheet">
  <style>
    .form-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .form-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem var(--side) 5rem;
    }

    .form-wrap h1 {
      font-family: 'Neue Montreal', sans-serif; font-weight: 500;
      font-weight: 400;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      line-height: 0.9;
      text-transform: lowercase;
      margin-bottom: 3rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 600px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-field label {
      font-family: 'Newsreader', serif; font-style: italic;
      font-size: 1rem;
      opacity: 0.8;
      text-transform: lowercase;
    }

    .form-field input,
    .form-field textarea {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: var(--white);
      font-family: 'Newsreader', serif; font-style: italic;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--white);
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .form-field textarea {
      height: 160px;
    }

    .form-submit {
      background: var(--white);
      color: var(--blue);
      border: none;
      font-family: 'Newsreader', serif; font-style: italic;
      font-size: 1.1rem;
      padding: 0.85rem 2.5rem;
      cursor: pointer;
      text-transform: lowercase;
      align-self: flex-start;
      transition: opacity 0.2s;
    }

    .form-submit:hover {
      opacity: 0.85;
    }

    .form-success {
      display: none;
      font-family: 'Newsreader', serif; font-style: italic;
      font-size: 1.2rem;
      margin-top: 1rem;
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      .form-wrap {
        padding: 2rem var(--side) 3rem;
      }
    }
  </style>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body class="inner form-page">
  <nav class="topnav">
    <a href="contact.html">back</a>
    <a href="index.html">home</a>
  </nav>

  <div class="form-wrap">
    <h1>get in touch</h1>
    <!--
      Formspree: Geh auf formspree.io, erstelle einen kostenlosen Account,
      erstelle ein neues Form und ersetze "YOUR_FORM_ID" mit deiner Form-ID.
      Dann landen alle Nachrichten in deinem Gmail-Postfach.
    -->
    <form
      class="contact-form"
      action="https://formspree.io/f/xgojyyag"
      method="POST"
    >
      <div class="form-field">
        <label for="name">name</label>
        <input type="text" id="name" name="name" placeholder="your name" required>
      </div>

      <div class="form-field">
        <label for="email">email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-field">
        <label for="message">message</label>
        <textarea id="message" name="message" placeholder="what's on your mind?" required></textarea>
      </div>

      <button type="submit" class="form-submit">send</button>
    </form>
  </div>
</body>
</html>
